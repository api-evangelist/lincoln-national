naftiko: 1.0.0-alpha2
info:
  label: Lincoln Financial LincSmart APIs
  description: Lincoln Financial provides LincSmart APIs for benefits administration integration. The platform includes Enrollment,
    EOI (Evidence of Insurability), and Plan Design APIs that enable real-time data sync between Lincoln Financial and benefits
    administration platforms such as ADP, Workday, Businessolver, bswift, and Benefitfocus.
  tags:
  - Lincoln
  - National
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: lincoln-national
    baseUri: https://www.lincolnfinancial.com
    description: Lincoln Financial LincSmart APIs HTTP API.
    resources:
    - name: enrollment
      path: /enrollment
      operations:
      - name: syncenrollment
        method: POST
        description: Sync Enrollment Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: eoi
      path: /eoi
      operations:
      - name: submiteoi
        method: POST
        description: Submit Evidence of Insurability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: plan-design
      path: /plan-design
      operations:
      - name: getplandesign
        method: GET
        description: Get Plan Design Information
        inputParameters:
        - name: planId
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: lincoln-national-rest
    description: REST adapter for Lincoln Financial LincSmart APIs.
    resources:
    - path: /enrollment
      name: syncenrollment
      operations:
      - method: POST
        name: syncenrollment
        description: Sync Enrollment Data
        call: lincoln-national.syncenrollment
        outputParameters:
        - type: object
          mapping: $.
    - path: /eoi
      name: submiteoi
      operations:
      - method: POST
        name: submiteoi
        description: Submit Evidence of Insurability
        call: lincoln-national.submiteoi
        outputParameters:
        - type: object
          mapping: $.
    - path: /plan-design
      name: getplandesign
      operations:
      - method: GET
        name: getplandesign
        description: Get Plan Design Information
        call: lincoln-national.getplandesign
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: lincoln-national-mcp
    transport: http
    description: MCP adapter for Lincoln Financial LincSmart APIs for AI agent use.
    tools:
    - name: syncenrollment
      description: Sync Enrollment Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lincoln-national.syncenrollment
      outputParameters:
      - type: object
        mapping: $.
    - name: submiteoi
      description: Submit Evidence of Insurability
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lincoln-national.submiteoi
      outputParameters:
      - type: object
        mapping: $.
    - name: getplandesign
      description: Get Plan Design Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lincoln-national.getplandesign
      with:
        planId: tools.planId
      inputParameters:
      - name: planId
        type: string
        description: planId
        required: true
      outputParameters:
      - type: object
        mapping: $.
