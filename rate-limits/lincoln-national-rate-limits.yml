description: Lincoln Financial does not publish public API rate-limit documentation for the LincSmart
  surface. Per-partner throttling and quota policies are configured at Lincoln's API gateway and are
  governed by the partner agreement; sandbox vs production differences must be confirmed with the Lincoln
  Financial integration team.
notes: No public rate-limit documentation found. Numeric ceilings are partner-contract driven.
sources:
  - https://www.lincolnfinancial.com/public/static/digitalbrochure/gp/lincsmart/index.html
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner API Limit
    scope: api-key
    metric: varies
    limit: see partner agreement
    notes: Per-second / per-day ceilings are not published; refer to your LincSmart partner contract.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter and honor Retry-After when
      returned by the gateway.
  - name: Real-time Sync vs Batch
    description: LincSmart enrollment supports real-time sync of elections; bulk / annual-enrollment
      windows may require coordinated throughput, not unbounded throttle.
