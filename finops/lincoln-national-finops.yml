description: 'FOCUS-aligned FinOps scaffold for Lincoln Financial / Lincoln National: partner-only LincSmart
  API access with no public per-call pricing. Consumer-side telemetry tracks against the LincSmart partner
  agreement, not metered API invoices.'
notes: Pricing is partner-contract driven. Meters describe the consumer-side observation surface.
sources:
  - https://www.lincolnfinancial.com/public/static/digitalbrochure/gp/lincsmart/index.html
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Lincoln National Corporation
serviceCategory: Insurance / Retirement / API
billingModel:
  pricingCategory: Custom Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Lincoln Financial LincSmart API
  ServiceCategory: Insurance / Retirement / API
  ProviderName: Lincoln Financial
  PublisherName: Lincoln National Corporation
  InvoiceIssuerName: Lincoln National Corporation
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - environment
      - partner
  - name: enrollment_events
    unit: event
    aggregation: sum
    dimensions:
      - employer
      - product
  - name: eoi_decisions
    unit: decision
    aggregation: sum
principles:
  - name: Visibility
    description: Use the LincSmart real-time sync events plus your own observability stack to track enrollment,
      EOI, and leave activity volumes; Lincoln does not expose a public usage API.
  - name: Allocation
    description: Tag calls by employer group, product (life, disability, retirement), and benefits platform
      partner so the LincSmart contract draw can be allocated correctly.
  - name: Optimization
    description: Replace weekly batch files with LincSmart real-time sync; throttle annual-enrollment
      bursts via partner-coordinated windows.
  - name: Accountability
    description: Assign a LincSmart partner owner who reviews enrollment-event throughput and contract
      consumption against quarterly benefit cycles.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
